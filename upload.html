<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIPE UPLOAD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .box { background: #111; border: 1px solid #333; padding: 30px; width: 100%; max-width: 450px; }
        h1 { text-align: center; font-size: 40px; letter-spacing: 8px; margin-bottom: 25px; }
        h1 span { color: #FF2200; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: #fff; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #FF2200; color: #fff; border: none; font-size: 14px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        button:hover { background: #cc1b00; }
        #msg { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>H<span>I</span>PE UPLOAD</h1>
        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price (₹)">
        <textarea id="desc" placeholder="Description" rows="3"></textarea>
        <input type="text" id="image" placeholder="Image URL">
        <button onclick="add()">UPLOAD PRODUCT</button>
        <p id="msg"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = window.supabase.createClient(
            'https://ozumnakvrhxqiliblavd.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dW1uYWt2cmh4cWlsaWJsYXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTQ3OTEsImV4cCI6MjA5NzQ5MDc5MX0.GntM_Pawq9PkZrV0iZYJF6tZ3pnAdvTMqYCgob_moD8'
        );

        async function add() {
            var n = document.getElementById('name').value;
            var p = document.getElementById('price').value;
            var d = document.getElementById('desc').value;
            var i = document.getElementById('image').value;
            var m = document.getElementById('msg');

            if (!n || !p || !i) {
                m.textContent = 'Fill all fields';
                m.style.color = 'red';
                return;
            }

            var { error } = await sb.from('products').insert([{ name: n, price: parseFloat(p), description: d, image_url: i }]);

            if (error) {
                m.textContent = 'Error: ' + error.message;
                m.style.color = 'red';
            } else {
                m.textContent = 'Added!';
                m.style.color = 'green';
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('desc').value = '';
                document.getElementById('image').value = '';
            }
        }
    </script>
</body>
</html>
