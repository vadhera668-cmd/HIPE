<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIPE ADMIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .admin-box {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 40px;
            letter-spacing: 8px;
            margin-bottom: 25px;
        }
        h1 span { color: #FF2200; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #FF2200;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }
        button:hover { background: #cc1b00; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>H<span>I</span>PE ADMIN</h1>

        <input type="text" id="name" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price (₹)">
        <textarea id="desc" placeholder="Description" rows="3"></textarea>
        <input type="text" id="image" placeholder="Image URL">
        <button onclick="uploadProduct()">UPLOAD PRODUCT</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ozumnakvrhxqiliblavd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dW1uYWt2cmh4cWlsaWJsYXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTQ3OTEsImV4cCI6MjA5NzQ5MDc5MX0.GntM_Pawq9PkZrV0iZYJF6tZ3pnAdvTMqYCgob_moD8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function uploadProduct() {
            var name = document.getElementById('name').value;
            var price = document.getElementById('price').value;
            var description = document.getElementById('desc').value;
            var image_url = document.getElementById('image').value;
            var status = document.getElementById('status');

            if (!name || !price || !image_url) {
                status.textContent = '❌ Please fill all fields';
                status.style.color = 'red';
                return;
            }

            var { error } = await supabase
                .from('products')
                .insert([{ 
                    name: name, 
                    price: parseFloat(price), 
                    description: description, 
                    image_url: image_url 
                }]);

            if (error) {
                status.textContent = '❌ Error: ' + error.message;
                status.style.color = 'red';
            } else {
                status.textContent = '✅ Product added!';
                status.style.color = 'green';
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('desc').value = '';
                document.getElementById('image').value = '';
            }
        }
    </script>
</body>
</html>
