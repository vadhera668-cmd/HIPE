<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE ADMIN — Product Upload</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        .admin-container {
            background: #0a0a0a;
            border: 1px solid #1A1A1A;
            padding: 50px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 48px;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }
        h1 span { color: #FF2200; }
        .subtitle {
            color: #666;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 12px;
            letter-spacing: 2px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #1A1A1A;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #FF2200;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%;
            padding: 16px;
            background: #FF2200;
            color: #fff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #cc1b00; }
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }
        .success { color: #00ff88; }
        .error { color: #FF2200; }
        .logout-btn {
            background: transparent;
            border: 1px solid #333;
            margin-top: 20px;
            font-size: 12px;
        }
        .logout-btn:hover {
            background: #1a1a1a;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <h1>H<span>Y</span>PE</h1>
        <p class="subtitle">ADMIN PANEL • UPLOAD PRODUCTS</p>
        
        <div id="login-section">
            <div class="form-group">
                <label>ADMIN PASSWORD</label>
                <input type="password" id="admin-password" placeholder="Enter secret password">
            </div>
            <button onclick="login()">UNLOCK</button>
            <p id="login-status" style="margin-top: 15px; text-align: center;"></p>
        </div>

        <div id="upload-section" style="display: none;">
            <div class="form-group">
                <label>PRODUCT NAME</label>
                <input type="text" id="product-name" placeholder="e.g. HYPE OVERSIZED TEE">
            </div>
            <div class="form-group">
                <label>PRICE (₹)</label>
                <input type="number" id="product-price" placeholder="e.g. 1499">
            </div>
            <div class="form-group">
                <label>DESCRIPTION</label>
                <textarea id="product-description" placeholder="Limited drop. Heavy cotton. Box fit."></textarea>
            </div>
            <div class="form-group">
                <label>IMAGE URL (Upload to Supabase Storage first)</label>
                <input type="text" id="product-image" placeholder="https://your-supabase-url/storage/v1/object/public/products/...">
            </div>
            <button onclick="uploadProduct()">UPLOAD TO STORE</button>
            <p id="status"></p>
            <button class="logout-btn" onclick="logout()">LOCK PANEL</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
